<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Apple Music JAM — Search, queue, and control music playback together on a shared device. A premium collaborative music experience.">
    <meta name="theme-color" content="#06060f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Apple Music JAM</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ═══════════════════════════════════════════ HEADER ═══════════════════════════════════════════ -->
    <header class="app-header" id="appHeader">
        <div class="header-inner">
            <div class="logo" id="logo">
                <span class="logo-emoji" aria-hidden="true">🎵</span>
                <h1 class="logo-text">Apple Music <span class="logo-accent">JAM</span></h1>
            </div>
            <div class="connection-status" id="connectionStatus" title="Disconnected">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-label" id="statusLabel">Offline</span>
            </div>
        </div>
    </header>

    <!-- ═══════════════════════════════════════════ MAIN ═══════════════════════════════════════════ -->
    <main class="app-main" id="appMain">

        <!-- ──────────────────── SEARCH ──────────────────── -->
        <section class="search-section" id="searchSection" aria-label="Search Apple Music">
            <div class="search-bar" id="searchBar">
                <svg class="search-icon" id="searchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input
                    type="search"
                    class="search-input"
                    id="searchInput"
                    placeholder="Search Apple Music..."
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Search for songs on Apple Music"
                >
                <button class="search-clear" id="searchClear" aria-label="Clear search" hidden>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <div class="search-loader" id="searchLoader" hidden>
                    <div class="spinner"></div>
                </div>
            </div>
        </section>

        <!-- ──────────────────── SEARCH RESULTS ──────────────────── -->
        <section class="search-results-section" id="searchResultsSection" aria-label="Search results" hidden>
            <h2 class="section-title" id="searchResultsTitle">Results</h2>
            <div class="search-results" id="searchResults" role="list">
                <!-- Song cards rendered here by JS -->
            </div>
        </section>

        <!-- ──────────────────── TAB NAVIGATION ──────────────────── -->
        <nav class="tab-nav" id="tabNav" aria-label="Content tabs">
            <button class="tab-btn active" id="tabNowPlaying" data-tab="nowPlaying" aria-selected="true" role="tab">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <span>Now Playing</span>
            </button>
            <button class="tab-btn" id="tabQueue" data-tab="queue" aria-selected="false" role="tab">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                <span>Queue</span>
                <span class="queue-badge" id="queueBadge" hidden>0</span>
            </button>
            <div class="tab-indicator" id="tabIndicator"></div>
        </nav>

        <!-- ──────────────────── NOW PLAYING ──────────────────── -->
        <section class="now-playing-section" id="nowPlayingSection" aria-label="Now playing">
            <div class="now-playing" id="nowPlaying">

                <!-- Empty State -->
                <div class="np-empty" id="npEmpty">
                    <div class="np-empty-icon">🎶</div>
                    <p class="np-empty-title">Nothing playing</p>
                    <p class="np-empty-subtitle">Search for a song to get the JAM started</p>
                </div>

                <!-- Active State -->
                <div class="np-active" id="npActive" hidden>
                    <div class="np-artwork-wrap" id="npArtworkWrap">
                        <img class="np-artwork" id="npArtwork" src="" alt="Album artwork" draggable="false">
                        <div class="np-artwork-reflection" id="npArtworkReflection"></div>
                    </div>

                    <div class="np-info">
                        <div class="np-equalizer" id="npEqualizer" aria-hidden="true">
                            <span class="eq-bar"></span>
                            <span class="eq-bar"></span>
                            <span class="eq-bar"></span>
                        </div>
                        <h2 class="np-title" id="npTitle">—</h2>
                        <p class="np-artist" id="npArtist">—</p>
                    </div>

                    <div class="np-progress" id="npProgress">
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-times">
                            <span class="time-elapsed" id="timeElapsed">0:00</span>
                            <span class="time-total" id="timeTotal">0:00</span>
                        </div>
                    </div>

                    <div class="np-controls" id="npControls">
                        <button class="control-btn control-btn--secondary" id="btnPrevious" aria-label="Previous track" title="Previous">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button class="control-btn control-btn--primary" id="btnPlayPause" aria-label="Play" title="Play">
                            <svg class="icon-play" id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="icon-pause" id="iconPause" viewBox="0 0 24 24" fill="currentColor" hidden><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button class="control-btn control-btn--secondary" id="btnNext" aria-label="Next track" title="Next">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ──────────────────── QUEUE ──────────────────── -->
        <section class="queue-section" id="queueSection" aria-label="Song queue" hidden>
            <div class="queue-header">
                <h2 class="section-title">Up Next</h2>
                <span class="queue-count" id="queueCount">0 songs</span>
            </div>
            <div class="queue-list" id="queueList" role="list">
                <!-- Queue items rendered here by JS -->
            </div>
            <div class="queue-empty" id="queueEmpty">
                <div class="queue-empty-icon">📋</div>
                <p class="queue-empty-title">Queue is empty</p>
                <p class="queue-empty-subtitle">Search and add songs to build the playlist</p>
            </div>
        </section>

    </main>

    <!-- ═══════════════════════════════════════════ TOAST ═══════════════════════════════════════════ -->
    <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <!-- ═══════════════════════════════════════════ SCRIPTS ═══════════════════════════════════════════ -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
